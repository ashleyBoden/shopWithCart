<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <link rel="stylesheet" href="./style.css">
  
  <title>Frontend Mentor | Product list with cart</title>

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  <style>
    .attribution { font-size: 0.6875rem; text-align: center; }
    .attribution a { color: hsl(228, 45%, 44%); }
  </style>
</head>
<body>

  <h1 class="title">Desserts</h1>

  <div class="modal" id="order-modal">
    <div class="modal-content">
      <div class="modal-header">
            <img src="./assets/images/icon-order-confirmed.svg" alt="Order placed icon" class="modal-icon">
            <div class="modal-title">Order Confirmed</div>
            <div class="modal-message">We hope you enjoy your food!</div>
      </div>
      <div class="modal-items"></div>      
      <button class="close-modal">Start New Order</button>
    </div>    
  </div>

  <div class="product-list"></div>
  <div class="cart"></div>

  <script src="./script.js"></script>
  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>. 
    Coded by <a href="#">Your Name Here</a>.
  </footer>
</body>
</html>
